server {
   listen 80;
   server_name localhost;

   root /usr/share/nginx/html;
   index index.html;

   location / {
      try_files $uri $uri/ =404;
   }

   # cache static assets
   location ~* \.(js|css|png|jpg|jpeg|gif|svg)$ {
      expires 1h;
      add_header Cache-Control "public";
   }

   # trust proxy headers
   real_ip_header X-Forwarded-For;
   set_real_ip_from 0.0.0.0/0;
}